<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>View from the Window</title>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.0.0/mapbox-gl.css" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/icons/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="map"></div>

<div id="hero">
    <button id="heroToggle">−</button>
    <h1 id="heroTitle"></h1>

    <div id="subtitle"></div>

    <div id="instruction">
        <span class="dot"></span>
        <span id="instructionText"></span>
    </div>

    <div id="buttons">
        <button class="btn" data-overlay="aboutOverlay" data-i18n="aboutButton"></button>
        <button class="btn" data-overlay="joinOverlay" data-i18n="joinButton"></button>
        <button class="btn" data-overlay="privacyOverlay" data-i18n="privacyButton"></button>
    </div>
</div>

<div id="langSwitcher">
    <button class="langBtn active" data-lang="en">English</button>
    <button class="langBtn" data-lang="es">Español</button>
    <button class="langBtn" data-lang="pt">Português</button>
    <button class="langBtn" data-lang="id">Bahasa Indonesia</button>
    <button class="langBtn" data-lang="hi">हिन्दी</button>
</div>

<div id="viewer" class="hidden">
    <button id="closeBtn">✕</button>

    <div id="photoCard">
        <img id="viewerImg" />

        <div id="photoInfo">
            <div id="photoCountry"></div>
            <div id="photoUser"></div>
            <div id="photoStory"></div>
        </div>
    </div>
</div>

<div id="aboutOverlay" class="overlay hidden">
    <div class="overlayCard">
        <h2 data-i18n="aboutTitle"></h2>

        <p data-i18n="aboutText1"></p>
        <p data-i18n="aboutText2"></p>
        <p data-i18n="aboutText3"></p>
        <p data-i18n="aboutText4"></p>

        <button class="btn closeOverlay">Close</button>
    </div>
</div>

<div id="joinOverlay" class="overlay hidden">
    <div class="overlayCard">
        <h2 data-i18n="joinTitle"></h2>

        <p data-i18n="joinText"></p>

        <button class="btn closeOverlay">Close</button>
    </div>
</div>

<div id="privacyOverlay" class="overlay hidden">
    <div class="overlayCard">
        <h2 data-i18n="privacyTitle"></h2>

        <ul>
            <li data-i18n="privacy1"></li>
            <li data-i18n="privacy2"></li>
            <li data-i18n="privacy3"></li>
            <li data-i18n="privacy4"></li>
            <li data-i18n="privacy5"></li>
        </ul>

        <button class="btn closeOverlay">Close</button>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/i18n.js"></script>
<script src="js/analytics.js"></script>
<script src="js/viewer.js"></script>
<script src="js/overlays.js"></script>
<script src="js/map.js"></script>
<script src="js/app.js"></script>

</body>
</html>
